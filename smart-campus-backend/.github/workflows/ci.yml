name: Smart Campus CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-build:
    name: Build & Test Spring Boot API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: ./smart-campus-backend
        run: mvn clean compile -DskipTests

      - name: Run Tests
        working-directory: ./smart-campus-backend
        run: mvn test
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

      - name: Package Application
        working-directory: ./smart-campus-backend
        run: mvn package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-campus-api
          path: smart-campus-backend/target/*.jar

  frontend-build:
    name: Build React Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: smart-campus-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./smart-campus-frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./smart-campus-frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:8080' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-campus-frontend
          path: smart-campus-frontend/dist/
