# Server
server.port=8080

# MongoDB Atlas
spring.data.mongodb.uri=YOUR_MONGODB_URI
spring.data.mongodb.database=smart_campus
# JWT
app.jwt.secret=${JWT_SECRET:your-super-secret-jwt-key-change-this-in-production-min-256-bits}
app.jwt.expiration=86400000

# OAuth2 Google
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/api/auth/oauth2/callback/google

# File Upload
spring.web.resources.static-locations=file:uploads/
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# Logging
logging.level.com.smartcampus=DEBUG
logging.level.org.springframework.security=INFO
